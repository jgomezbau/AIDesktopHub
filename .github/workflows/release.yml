name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag and package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks and tests
        run: |
          npm run check:syntax
          npm test

      - name: Build Linux release artifacts
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="$RUNNER_TEMP/aidesktophub-release"
          rm -rf "$staging_dir"
          mkdir -p "$staging_dir"

          npm run build:appimage -- --publish never
          cp dist/*.AppImage "$staging_dir/"

          npm run build:deb -- --publish never
          cp dist/*.deb "$staging_dir/"

          npx electron-builder --linux tar.gz --publish never
          cp dist/*.tar.gz "$staging_dir/"

          rm -rf dist
          mkdir -p dist
          cp "$staging_dir"/* dist/

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.AppImage ./*.deb ./*.tar.gz > SHA256SUMS.txt

      - name: Create release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          # AI Desktop Hub ${GITHUB_REF_NAME}

          ## Resumen

          La versión ${GITHUB_REF_NAME} agrega una base de tests automatizados, integración continua con GitHub Actions y publicación automática de releases mediante tags semánticos. Esta automatización se incorpora en **v2.0.1**.

          ## Cambios principales

          - Soporte para Gemini y Z.ai con sesiones y launchers independientes.
          - Modo genérico con selector de asistentes y nueva ventana Acerca de.
          - Tests automatizados con **node:test**.
          - Script **npm test**.
          - Script **npm run check:syntax**.
          - Script **npm run ci**.
          - Workflow CI para eventos **push** y **pull_request**.
          - Workflow Release para tags **vX.Y.Z**.
          - Validación de coincidencia entre el tag y la versión de **package.json**.
          - Build automático de AppImage, **.deb** y **tar.gz**.
          - Generación de **SHA256SUMS.txt**.

          ## Artefactos incluidos

          - AppImage
          - Paquete **.deb**
          - Archivo **tar.gz**
          - **SHA256SUMS.txt**

          ## Cómo instalar

          En Debian o Ubuntu, descarga e instala el paquete **.deb**. En otras distribuciones Linux puedes ejecutar la AppImage o extraer el archivo **tar.gz**.

          ## Cómo verificar

          Descarga **SHA256SUMS.txt** junto con los artefactos y ejecuta:

              sha256sum --check SHA256SUMS.txt

          ## Notas técnicas

          - Los releases se disparan mediante tags semánticos, no mediante mensajes de commit.
          - Los pull requests ejecutan las validaciones de CI, pero no publican releases.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AI Desktop Hub ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/SHA256SUMS.txt

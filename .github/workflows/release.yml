name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate tag and package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid semantic version tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          if [[ "$tag_version" != "$package_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $package_version" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks, lint, and tests
        run: |
          npm run check:syntax
          npm run lint
          npm test

      - name: Build all Linux release artifacts (AppImage + deb + tar.gz)
        shell: bash
        run: |
          set -euo pipefail
          npx electron-builder \
            --linux AppImage deb tar.gz \
            --publish never

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum ./*.AppImage ./*.deb ./*.tar.gz > SHA256SUMS.txt

      - name: Create release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<EOF
          # AI Desktop Hub ${GITHUB_REF_NAME}

          ## Resumen

          La versión ${GITHUB_REF_NAME} publica la versión declarada en **package.json** con validación automatizada, artefactos Linux y checksums reproducibles.

          ## Cambios principales

          - Validación de coincidencia entre el tag **${GITHUB_REF_NAME}** y la versión de **package.json**.
          - Comprobación de sintaxis, lint y tests antes de publicar.
          - Build automático de AppImage, paquete **.deb** y archivo **tar.gz**.
          - Generación de **SHA256SUMS.txt** para verificar la integridad de los artefactos.
          - Consulta el changelog del repositorio para el detalle funcional completo de esta versión.

          ## Artefactos incluidos

          - AppImage
          - Paquete **.deb**
          - Archivo **tar.gz**
          - **SHA256SUMS.txt**

          ## Cómo instalar

          En Debian o Ubuntu, descarga e instala el paquete **.deb**. En otras distribuciones Linux puedes ejecutar la AppImage o extraer el archivo **tar.gz**.

          ## Cómo verificar

          Descarga **SHA256SUMS.txt** junto con los artefactos y ejecuta:

              sha256sum --check SHA256SUMS.txt

          ## Notas técnicas

          - Los releases se disparan mediante tags semánticos, no mediante mensajes de commit.
          - Los pull requests ejecutan las validaciones de CI, pero no publican releases.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: AI Desktop Hub ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz
            dist/SHA256SUMS.txt
